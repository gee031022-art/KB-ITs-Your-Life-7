<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .y {
        background-color: yellow;
        width: 200px;
        height: 200px;
        position: relative;
      }
      .r {
        background-color: red;
        width: 100px;
        height: 100px;
        position: absolute;
        top: 0;
        left: 0;
      }
      .b {
        background-color: blue;
        width: 100px;
        height: 100px;
        position: absolute;
        top: 0;
        left: 100px;
      }
      .g {
        background-color: green;
        width: 100px;
        height: 100px;
        position: absolute;
        top: 100px;
        left: 0;
      }
    </style>
  </head>
  <body>
    <div class="y">
      Yellow
      <div class="r">Red</div>
      <div class="b">Blue</div>
      <div class="g">Green</div>
    </div>
  </body>
</html>
