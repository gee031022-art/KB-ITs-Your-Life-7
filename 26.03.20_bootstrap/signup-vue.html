<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  </head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <body>
    <div id="app">
      <form class="signup container" @submit.prevent="signup">
        <label for="id">아이디 : </label>
        <input
          type="text"
          id="id"
          name="id"
          required
          v-model="person.id"
          @input="idExist = true; idChecked = false;"
        />
        <input type="button" value="아이디중복확인" @click="iddupchk" />
        <span
          class="iddupchk"
          v-if="idChecked && !idExist"
          style="color: green"
        >
          {{ person.id }}는 사용가능한 아이디입니다
        </span>
        <span v-if="idChecked && idExist" style="color: red">
          {{ person.id }}는 이미 사용중인 아이디입니다
        </span>
        <br />

        <label for="pwd">비밀번호 :</label>
        <input
          type="password"
          id="pwd"
          name="pwd1"
          required
          v-model="person.pwd"
        />
        <br />

        <label for="pwd2">비밀번호확인: </label>
        <input type="password" id="pwd2" required v-model="pwd2" />
        <br />

        <label for="e">이메일 :</label>
        <input
          type="email"
          id="e"
          name="email"
          required
          v-model="person.email"
        />
        <br />

        <input
          type="submit"
          value="가입"
          :style="{ visibility: (idChecked && !idExist) ? 'visible' : 'hidden' }"
        />
        <input type="reset" value="초기화" />
      </form>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            person: { id: '', pwd: '', email: '' },
            pwd2: '',
            idExist: true,
            idChecked: false,
          };
        },
        methods: {
          // ✅ iddupchk는 별도 메서드로 독립
          async iddupchk() {
            if (!this.person.id) {
              alert('아이디를 입력해주세요');
              return;
            }
            const url = `http://localhost:3000/iddupchk?id=${this.person.id}`;
            // ✅ 버그 수정: +this.person.id → this.person.id (숫자 변환 불필요)
            try {
              const response = await fetch(url);
              // ✅ 오타 수정: console.lod → console.log
              // ✅ 오타 수정: respone → response
              console.log(response);
              if (response.status === 200) {
                // ✅ 버그 수정: == → === / if 괄호·중괄호 추가
                const data = await response.json();
                this.idExist = data.exists;
                this.idChecked = true;
              }
            } catch (err) {
              alert('서버 오류: ' + err.message);
            }
          },
          signup() {
            if (!this.idChecked || this.idExist) {
              alert('아이디 중복확인을 해주세요');
              return;
            }
            if (this.person.pwd !== this.pwd2) {
              alert('비밀번호가 서로 다릅니다');
              return;
            }
            // ✅ signup 안에 있던 iddupchk 코드 제거
            const url = 'http://localhost:3000/signup';
            const serchParams = new URLSearchParams(this.person);
            const requestInit = {
              method: 'POST',
              body: serchParams,
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            };
            fetch(url, requestInit)
              .then((Response) => {
                return Response.text();
              })
              .then((ResponseText) => {
                alert(ResponseText);
              })
              .catch((err) => {
                alert(err.message);
              });
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
