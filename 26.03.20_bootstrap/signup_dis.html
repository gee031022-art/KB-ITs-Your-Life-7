<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>회원가입</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: linear-gradient(135deg, #e8f4fd 0%, #d6eaf8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(52, 152, 219, 0.15);
        overflow: hidden;
      }
      .card-header {
        background: linear-gradient(135deg, #2980b9, #3498db);
        padding: 2rem;
        text-align: center;
        border: none;
      }
      .card-header h2 {
        color: #fff;
        font-weight: 700;
        font-size: 1.6rem;
        margin: 0;
        letter-spacing: 0.05em;
      }
      .card-header p {
        color: rgba(255, 255, 255, 0.8);
        margin: 0.4rem 0 0;
        font-size: 0.9rem;
      }
      .card-body {
        padding: 2rem 2.5rem;
        background: #fff;
      }
      .form-label {
        font-weight: 500;
        color: #2c3e50;
        font-size: 0.9rem;
        margin-bottom: 0.35rem;
      }
      .form-control {
        border-radius: 8px;
        border: 1.5px solid #d5e8f7;
        padding: 0.55rem 0.85rem;
        font-size: 0.95rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
      }
      .btn-check-id {
        background: #eaf4fb;
        border: 1.5px solid #3498db;
        color: #2980b9;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 500;
        padding: 0.55rem 0.9rem;
        white-space: nowrap;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .btn-check-id:hover {
        background: #3498db;
        color: #fff;
      }
      .badge-available {
        background: #eafaf1;
        color: #27ae60;
        border: 1px solid #a9dfbf;
        border-radius: 6px;
        padding: 0.3rem 0.7rem;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .badge-taken {
        background: #fdedec;
        color: #e74c3c;
        border: 1px solid #f5b7b1;
        border-radius: 6px;
        padding: 0.3rem 0.7rem;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .btn-signup {
        background: linear-gradient(135deg, #2980b9, #3498db);
        border: none;
        border-radius: 10px;
        color: #fff;
        font-weight: 700;
        font-size: 1rem;
        padding: 0.7rem;
        letter-spacing: 0.05em;
        transition:
          opacity 0.2s,
          transform 0.1s;
      }
      .btn-signup:not(:disabled):hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-signup:disabled {
        background: linear-gradient(135deg, #85c1e9, #aed6f1);
        cursor: not-allowed;
        opacity: 0.7;
      }
      .btn-reset {
        background: #f4f6f7;
        border: 1.5px solid #d5d8dc;
        border-radius: 10px;
        color: #7f8c8d;
        font-weight: 500;
        font-size: 1rem;
        padding: 0.7rem;
        transition: background 0.2s;
      }
      .btn-reset:hover {
        background: #e8eaed;
        color: #555;
      }
      .divider {
        border: none;
        border-top: 1.5px solid #eaf2fb;
        margin: 1.5rem 0;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container" style="max-width: 480px">
      <div class="card">
        <div class="card-header">
          <h2>📋 회원가입</h2>
          <p>아래 정보를 입력하여 계정을 만드세요</p>
        </div>
        <div class="card-body">
          <form @submit.prevent="signup">
            <!-- 아이디 -->
            <div class="mb-3">
              <label for="id" class="form-label">아이디</label>
              <div class="d-flex gap-2">
                <input
                  type="text"
                  id="id"
                  name="id"
                  class="form-control"
                  placeholder="아이디를 입력하세요"
                  required
                  v-model="person.id"
                  @input="idExist = true; idChecked = false;"
                />
                <button type="button" class="btn-check-id" @click="iddupchk">
                  중복확인
                </button>
              </div>
              <!-- 중복확인 결과 -->
              <div class="mt-2" v-if="idChecked">
                <span class="badge-available" v-if="!idExist"
                  >✅ {{ person.id }}는 사용가능합니다</span
                >
                <span class="badge-taken" v-if="idExist"
                  >❌ {{ person.id }}는 이미 사용중입니다</span
                >
              </div>
            </div>

            <hr class="divider" />

            <!-- 비밀번호 -->
            <div class="mb-3">
              <label for="pwd" class="form-label">비밀번호</label>
              <input
                type="password"
                id="pwd"
                name="pwd1"
                class="form-control"
                placeholder="비밀번호를 입력하세요"
                required
                v-model="person.pwd"
              />
            </div>

            <!-- 비밀번호 확인 -->
            <div class="mb-3">
              <label for="pwd2" class="form-label">비밀번호 확인</label>
              <input
                type="password"
                id="pwd2"
                class="form-control"
                placeholder="비밀번호를 다시 입력하세요"
                required
                v-model="pwd2"
              />
              <!-- 비밀번호 불일치 경고 -->
              <div class="mt-1" v-if="pwd2 && person.pwd !== pwd2">
                <small style="color: #e74c3c; font-size: 0.82rem"
                  >⚠️ 비밀번호가 일치하지 않습니다</small
                >
              </div>
            </div>

            <!-- 이메일 -->
            <div class="mb-4">
              <label for="e" class="form-label">이메일</label>
              <input
                type="email"
                id="e"
                name="email"
                class="form-control"
                placeholder="example@email.com"
                required
                v-model="person.email"
              />
            </div>

            <!-- 버튼 -->
            <div class="d-grid gap-2">
              <button
                type="submit"
                class="btn-signup"
                :disabled="!(idChecked && !idExist)"
                :title="!(idChecked && !idExist) ? '아이디 중복확인을 먼저 해주세요' : ''"
              >
                <!-- ✅ visibility 대신 disabled 처리: 버튼이 항상 보임 -->
                가입하기
              </button>
              <button type="reset" class="btn-reset" @click="resetForm">
                초기화
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            person: { id: '', pwd: '', email: '' },
            pwd2: '',
            idExist: true,
            idChecked: false,
          };
        },
        methods: {
          async iddupchk() {
            if (!this.person.id) {
              alert('아이디를 입력해주세요');
              return;
            }
            const url = `http://localhost:3000/iddupchk?id=${this.person.id}`;
            try {
              const response = await fetch(url);
              console.log(response);
              if (response.status === 200) {
                const data = await response.json();
                this.idExist = data.exists;
                this.idChecked = true;
              }
            } catch (err) {
              alert('서버 오류: ' + err.message);
            }
          },
          signup() {
            if (!this.idChecked || this.idExist) {
              alert('아이디 중복확인을 해주세요');
              return;
            }
            if (this.person.pwd !== this.pwd2) {
              alert('비밀번호가 서로 다릅니다');
              return;
            }
            const url = 'http://localhost:3000/signup';
            const serchParams = new URLSearchParams(this.person);
            const requestInit = {
              method: 'POST',
              body: serchParams,
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            };
            fetch(url, requestInit)
              .then((Response) => Response.text())
              .then((ResponseText) => alert(ResponseText))
              .catch((err) => alert(err.message));
          },
          resetForm() {
            this.person = { id: '', pwd: '', email: '' };
            this.pwd2 = '';
            this.idExist = true;
            this.idChecked = false;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
