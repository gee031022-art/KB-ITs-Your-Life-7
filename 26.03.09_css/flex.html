<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .container {
      height: 300px;
      display: flex;
      background-color: royalblue;
      align-items: center; /* 수직 가운데 정렬 */
      /* justify-content: center; 수평 가운데 정렬 */
      /* justify-content: space-between; 아이템 사이 간격 최대화 */
      justify-content: space-around; /* 아이템 사이 간격 동일하게 */
      gap: 30px; /* 아이템 사이 간격 */
      /* height: 300px; */

      flex-direction: column; /*아이템 세로 정렬 */
      /* flex-wrap: wrap; 아이템이 컨테이너를 벗어나면 다음 줄로 이동 */
    }
    .item {
      width: 100px;
      height: 100px;
      background-color: rgb(253, 253, 4);
    }
    /* .item :first-child {
      flex-grow: 1;
    } */
  </style>

  <body>
    <div class="container">
      <div class="item">카드1</div>
      <div class="item">카드2</div>
      <div class="item">카드3</div>
    </div>
  </body>
</html>
