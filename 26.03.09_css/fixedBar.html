<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #top-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 50px;
        background-color: lightcoral;
      }
      #left-bar {
        position: fixed;
        top: 50px;
        left: 0;
        bottom: 0;
        width: 100px;
        background-color: rgb(28, 191, 245);
      }
      #center-bar {
        margin-left: 100px; /* 왼쪽 바의 너비만큼 여백 추가 */
        padding-top: 50px; /* 상단 바의 높이만큼 여백 추가 */
      }
    </style>
  </head>
  <body>
    <div id="top-bar"></div>
    <div id="left-bar"></div>
    <div id="center-bar">
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Perspiciatis
        molestias impedit quidem! Ex, magni modi facere dolorum distinctio
        quidem minus hic placeat quisquam laboriosam consectetur. Corporis
        placeat consequatur nemo. Obcaecati.
      </p>
    </div>
  </body>
</html>
