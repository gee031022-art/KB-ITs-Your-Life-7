      window.onload = function () {
        const score = [
          10, 20, 30, 40, 50, 1, 25, 234, 23, 423, 42, 5, 3, 1, 5, 3, 50,
        ];
        console.log('before: ' + score);

        score.sort();
        console.log('after: ' + score);
        score.sort((a, b) => a - b);
        console.log('sorted: ' + score);
      };
    </script>
