<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script>
      let person = {
        name: '이현지',
        address: '한국',
        point: 4,
        print: function () {
          console.log(this); // 일반 함수에서는 this가 해당 객체를 가리킵니다.
          console.log(
            this.name +
              '은 ' +
              this.address +
              '에 살고 있습니다. 점수는 ' +
              this.point +
              '점입니다.',
          );
        },
        work: () => {
          console.log(this); // 화살표 함수에서는 this가 상위 스코프를 참조하므로, 전역 객체인 window를 가리킵니다.
          console.log('화살표 함수로 정의된 메서드입니다.');
        },
      };
      console.log(person.name); // 객체의 속성에 접근하는 방법
      console.log(person['address']); // 객체의 속성에 접근하는 또 다른 방법
      console.log(person['point']); // 객체의 속성에 접근하는 또 다른 방법
      person.print();
      person.work();
    </script>
  </head>
  <body></body>
</html>
