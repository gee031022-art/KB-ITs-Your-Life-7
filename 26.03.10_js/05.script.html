<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script>
      var v1 = 10;
      v2 = 20;

      let let1 = 10;
      console.log(window.v1);
      console.log(window.v2);
      console.log(window.let1);

      var vf1 = function () {
        console.log('함수입니다', 'v1=' + window.v1);
        var v3 = 30; //함수 내부에서 선언한 변수는 함수 내부에서만 사용가능.
        console.log('v3=' + v3);
      };
      vf1(); //함수호출
      console.log(window.v3);

      for (var i = 0; i < 10; i++) {
        console.log('i=' + i);
      }
      console.log('for문 밖에서 i=' + i); // var로 선언한 i는 for문 밖에서도 접근 가능
      for (let j = 0; j < 10; j++) {
        // let으로 선언한 j는 for문 내에서만 접근 가능,블록 스콥을 가진다, var은 함수 스콥를 가진다.
        console.log('j=' + j);
      }
      // console.log('for문 밖에서 j=' + j); // let으로 선언한 j는 for문 밖에서 접근 불가능
    </script>
  </head>
  <body></body>
</html>
