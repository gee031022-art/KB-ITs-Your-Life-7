<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script>
      //함수의 종류
      //이름을 갖는 함수
      function func1() {
        console.log('이름을 갖는 함수입니다.');
      }
      func1(); //함수 호출
      //이름없는 함수
      var func2 = function () {
        console.log('이름없는 함수입니다.');
      };
      func2(); //함수 호출

      //매개변수
      let func3 = function (a, b) {
        console.log('a=' + a);
        console.log('b=' + b);
        return a + b; //함수의 결과값을 반환
      };
      let result = func3(10, 20); //함수 호출과 동시에 매개변수에 값 전달
      console.log('func3의 결과값:' + result);

      let f2 = function (p1, p2) {
        console.log(p1, p2);
      };
      f2(1, 'hllo');
      f2(1);
      let result2 = f2(1, 2);
      console.log(result2); //undefined 반환
      f2(1, function () {
        //함수를 매개변수로 전달 callback 함수라고도 불립니다.
        console.log('함수를 매개변수로 전달했습니다.');
      });

      let f3 = function (p1, p2, p3) {
        window.setTimeout(function () {
          p1(p2, p3);
        }, 1000);
      };
      //     p1(p2, p3);
      //   };
      f3(
        function (p4, p5) {
          console.log(p4, p5);
        },
        1,
        2,
      );
      f3(
        function (p4, p5) {
          alert(p4 + '+' + p5 + '=' + (p4 + p5));
        },
        'hello',
        'world',
      );
      f3(
        (p4, p5) => {
          console.log('뭐', p4, p5);
        },
        1,
        2,
      );
    </script>
  </head>
  <body></body>
</html>
