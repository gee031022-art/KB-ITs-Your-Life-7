<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>배달 앱 - 좋은 UX (확장형)</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        color: #222;
      }
      .wrapper {
        max-width: 980px;
        margin: 40px auto;
        padding: 20px;
      }
      .panel {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        border-top: 8px solid #e74c3c;
      }
      .section {
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 16px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .tag-list,
      .option-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .tag,
      .option-card {
        background: #f1f3f5;
        border: 1px solid #ddd;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .tag.selected,
      .option-card.selected {
        border-color: #e74c3c;
        background: #fff0ee;
        font-weight: bold;
      }
      .dense-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
        margin-top: 10px;
      }
      .dense-item {
        padding: 14px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fafafa;
        cursor: pointer;
      }
      .dense-item.selected {
        border: 2px solid #e74c3c;
        background: #fff5f4;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="panel">
        <h2>✅ 좋은 UX (확장형 구조)</h2>
        <p>하나 선택하면 아래 단계가 자연스럽게 열리는 구조</p>

        <!-- 카테고리 -->
        <div class="section">
          <div class="section-title">1. 카테고리</div>
          <div class="tag-list" id="categoryList">
            <div class="tag" data-value="치킨">치킨</div>
            <div class="tag" data-value="피자">피자</div>
            <div class="tag" data-value="햄버거">햄버거</div>
          </div>
        </div>

        <!-- 가게 -->
        <div class="section hidden" id="storeSection">
          <div class="section-title">2. 가게</div>
          <div class="dense-list">
            <div class="dense-item" data-value="치킨천국">치킨천국</div>
            <div class="dense-item" data-value="피자월드">피자월드</div>
          </div>
        </div>

        <!-- 메뉴 -->
        <div class="section hidden" id="menuSection">
          <div class="section-title">3. 메뉴</div>
          <div class="dense-list">
            <div class="dense-item" data-value="후라이드">후라이드</div>
            <div class="dense-item" data-value="페퍼로니">페퍼로니 피자</div>
          </div>
        </div>

        <!-- 옵션 -->
        <div class="section hidden" id="optionSection">
          <div class="section-title">4. 옵션</div>
          <div class="option-list">
            <div class="option-card" data-value="콜라 추가">콜라 추가</div>
            <div class="option-card" data-value="치즈 추가">치즈 추가</div>
          </div>
        </div>

        <!-- 결과 -->
        <div class="section hidden" id="resultSection">
          <div class="section-title">결과</div>
          <div id="resultBox"></div>
        </div>
      </div>
    </div>

    <script>
      let data = { category: '', store: '', menu: '', option: '' };

      const show = (id) =>
        document.getElementById(id).classList.remove('hidden');

      document.querySelectorAll('#categoryList .tag').forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll('#categoryList .tag')
            .forEach((t) => t.classList.remove('selected'));
          el.classList.add('selected');
          data.category = el.dataset.value;
          show('storeSection');
        };
      });

      document.querySelectorAll('#storeSection .dense-item').forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll('#storeSection .dense-item')
            .forEach((t) => t.classList.remove('selected'));
          el.classList.add('selected');
          data.store = el.dataset.value;
          show('menuSection');
        };
      });

      document.querySelectorAll('#menuSection .dense-item').forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll('#menuSection .dense-item')
            .forEach((t) => t.classList.remove('selected'));
          el.classList.add('selected');
          data.menu = el.dataset.value;
          show('optionSection');
        };
      });

      document.querySelectorAll('#optionSection .option-card').forEach((el) => {
        el.onclick = () => {
          document
            .querySelectorAll('#optionSection .option-card')
            .forEach((t) => t.classList.remove('selected'));
          el.classList.add('selected');
          data.option = el.dataset.value;

          show('resultSection');
          document.getElementById('resultBox').innerHTML = `
            카테고리: ${data.category}<br>
            가게: ${data.store}<br>
            메뉴: ${data.menu}<br>
            옵션: ${data.option}
          `;
        };
      });
    </script>
  </body>
</html>
