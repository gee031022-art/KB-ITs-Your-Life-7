<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클로저 실습</title>
    <script>
      //함수(반환되는 이름없는)가 선언될 당시의 외부 스코프(creatCount) 기억해서, 해당함수가 외부에서 호출되더라도 그 환경에 계속 접근 할 수 있다
      function createCount() {
        let count = 0; //데이터 은닉, 값을 유지
        //해당 블럭에만 사용가능
        return function () {
          count++; //외부변수 count 접근, 증가
          return count;
        };
      }

      //함수선언
      const result = createCount(); //함수 반환
      console.log(result()); //return된 함수를 호출, 함수호출
      console.log(result());
    </script>
  </head>
  <body></body>
</html>
